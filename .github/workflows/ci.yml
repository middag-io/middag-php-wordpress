name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

# CI uses no private infrastructure and no credentials. This adapter builds on
# the OSS middag-io/framework package (which transitively brings in middag-io/ui),
# resolved from public Composer sources. Until the middag-io/* packages are
# published to a public Composer registry, resolve them from their public GitHub
# source repositories (see CONTRIBUTING.md).

jobs:
  quality:
    name: Static analysis & style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-publish --no-check-lock

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: PHPStan + PHP-CS-Fixer + Rector (dry-run)
        run: composer check

  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: PHPUnit
        run: composer test
