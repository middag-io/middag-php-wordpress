name: Release

on:
  push:
    branches: [main]

# Thin wrapper over the org reusable workflows (middag-io/.github-private).
# See ADR-003 (release strategy) and ADR-006 (reusable workflows).
jobs:
  release-please:
    uses: middag-io/.github-private/.github/workflows/release-please.yml@main
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit

  # Keep develop current with whatever release-please shipped onto main,
  # so the GitFlow loop stays closed and develop never drifts behind.
  sync-develop:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: middag-io/.github-private/.github/workflows/sync-develop.yml@main
    permissions:
      contents: write
